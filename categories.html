<!DOCTYPE html>
<html lang="en">
<head>
  <title>Select Category</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="back-btn" onclick="goBack()">&#8592; Back</div>

  <header>
    <h1>Select Category</h1>
    <p class="subtitle">Choose a topic to practice previous year questions</p>
  </header>

  <section class="grid">

    <div class="box" onclick="chooseCategory('reasoning')">
      <img src="logical reasoning.png" alt="Logical Reasoning">
      <p>Logical Reasoning</p>
    </div>

    <div class="box" onclick="chooseCategory('aptitude')">
      <img src="accenture.png" alt="Aptitude">
      <p>Aptitude</p>
    </div>

    <div class="box" onclick="chooseCategory('verbal')">
      <img src="verbal ability.jpg" alt="Verbal Ability">
      <p>Verbal Ability</p>
    </div>

    <div class="box" onclick="chooseCategory('english')">
      <img src="english.jpg" alt="English">
      <p>English</p>
    </div>

    <div class="box" onclick="chooseCategory('programming')">
      <img src="programming logic.png" alt="Programming Logic">
      <p>Programming Logic</p>
    </div>

  </section>

  <footer>
    Created by <b>Umakant Kautkar</b> | SYBCS-C
  </footer>

  <script src="script.js"></script>
</body>
</html>
