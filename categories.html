<!DOCTYPE html>
<html>
<head>
  <title>Select Category</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="back-btn" onclick="goBack()">
  &#8592; Back
</div>


<h2>Select Category</h2>

<div class="grid">

  <div class="box" onclick="chooseCategory('reasoning')">
    <img src="logical reasoning.png" alt="Logical Reasoning">
    <p>Logical Reasoning</p>
  </div>

  <div class="box" onclick="chooseCategory('aptitude')">
    <img src="aptitude.jpg" alt="Aptitude">
    <p>Aptitude</p>
  </div>

  <div class="box" onclick="chooseCategory('verbal')">
    <img src="verbal ability.jpg" alt="Verbal Ability">
    <p>Verbal Ability</p>
  </div>

  <div class="box" onclick="chooseCategory('english')">
    <img src="english.jpg" alt="English">
    <p>English</p>
  </div>


  <div class="box" onclick="chooseCategory('programming')">
    <img src="programming logic.png" alt="Programming Logic">
    <p>Programming Logic</p>
  </div>

</div>

  <p>Created by <b>Umakant Kautkar</b> | SYBCS-C</p>
